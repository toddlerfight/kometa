<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コメタ</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=133">
</head>
<body>
  <div id="layout">
    <nav id="sidebar">
      <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-text">コメタ</span>
      </div>
      <div class="nav-items">
        <a class="nav-item" data-view="library">Library</a>
        <a class="nav-item" data-view="pull-list">Pull List</a>
        <a class="nav-item" data-view="activity">Activity<span class="nav-badge" id="activity-badge"></span></a>
        <a class="nav-item" data-view="settings">Settings</a>
      </div>
    </nav>
    <div id="content">
      <div id="series-bg" class="hidden">
        <div id="series-bg-img"></div>
      </div>
      <header id="topbar">
        <span id="topbar-title"></span>
        <div id="topbar-actions"></div>
      </header>
      <main id="app"></main>
    </div>
  </div>

  <div id="modal-backdrop" class="hidden" onclick="closeModal()">
    <div id="modal" class="hidden" onclick="event.stopPropagation()"></div>
  </div>

  <div id="variant-lightbox" class="hidden" onclick="_lbClose()">
    <button class="vlb-close" onclick="_lbClose(event)">✕</button>
    <button class="vlb-nav vlb-prev" onclick="_lbStep(event,-1)">‹</button>
    <button class="vlb-nav vlb-next" onclick="_lbStep(event,1)">›</button>
    <div class="vlb-stage" onclick="event.stopPropagation()">
      <img class="vlb-img" id="vlb-img" alt="">
      <div><div class="vlb-name" id="vlb-name"></div><div class="vlb-count" id="vlb-count"></div></div>
      <div class="vlb-actions">
        <button class="vlb-btn" id="vlb-include" onclick="_lbToggleInclude()">Include</button>
        <button class="vlb-btn vlb-star" id="vlb-star" onclick="_lbSetCover()">★ Set as cover</button>
      </div>
    </div>
  </div>
  <div id="toast" class="toast-hidden"></div>
  <div id="ptr">↓</div>

  <script src="/app.js?v=133"></script>
</body>
</html>
