<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kometa — hero mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #000000;
      --su1:  #111111;
      --su2:  #1a1a1a;
      --su3:  #2a2a2a;
      --bd:   #2a2a2a;
      --pri:  #91fc4e;
      --prih: #1a2e0d;
      --grn:  #48c774;
      --amb:  #fddd57;
      --red:  #fc3860;
      --upc:  #00d3ff;
      --blu:  #249cee;
      --tp:   #fafafa;
      --tm:   #d2d2d2;
      --tq:   #666666;
      --nw:   140px;
      --tb:   48px;
    }

    body {
      background: var(--bg);
      color: var(--tp);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.4;
      height: 100vh;
      overflow: hidden;
    }

    #layout {
      display: grid;
      grid-template-columns: var(--nw) 1fr;
      height: 100vh;
    }

    #sidebar {
      background: var(--su1);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .logo {
      height: var(--tb);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 20px; height: 20px;
      background: var(--pri);
      border-radius: 2px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
    }

    .nav-items { display: flex; flex-direction: column; padding-top: 20px; }

    .nav-item {
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--tq);
      cursor: pointer;
      position: relative;
      margin-bottom: 18px;
      text-decoration: none;
      user-select: none;
    }

    .nav-item.active {
      color: var(--pri);
      background: var(--prih);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px; height: 100%;
      background: var(--pri);
    }

    #content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      height: var(--tb);
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      height: 22px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--bd);
      border-radius: 3px;
      background: transparent;
      color: var(--tq);
    }

    #app {
      flex: 1;
      overflow-y: auto;
    }

    /* ─── HERO ─── */

    #app { position: relative; }

    .detail-hero {
      position: relative;
      height: 150px;
      flex-shrink: 0;
    }

    /* background lives outside the hero — spans hero + issue grid */
    .detail-bg-layer {
      position: absolute;
      top: 0; left: -24px; right: -24px;
      height: 1200px;
      z-index: 0;
      pointer-events: none;
    }

    .detail-bg-layer-img {
      position: absolute;
      inset: -40px;
      background-image: url('https://static.metron.cloud/media/issue/2024/09/23/2db9a60d7a4a41b180cd9017f3430b27.jpg');
      background-size: 130%;
      background-position: left 33%;
      filter: blur(10px) brightness(0.33) saturate(1.7);
      transform: scale(1.05);
      /* combine ellipse (sides) + linear (bottom fade) — intersection means both must pass */
      -webkit-mask-image:
        linear-gradient(to bottom, black 30%, transparent 68%),
        radial-gradient(ellipse 80% 80% at 62% 40%, black 0%, black 40%, transparent 72%);
      -webkit-mask-composite: destination-in;
      mask-image:
        linear-gradient(to bottom, black 30%, transparent 68%),
        radial-gradient(ellipse 80% 80% at 62% 40%, black 0%, black 40%, transparent 72%);
      mask-composite: intersect;
    }

    /* hero content sits above the bg layer */
    .detail-hero-gradient,
    .detail-hero-cover-wrap,
    .detail-hero-content { position: relative; z-index: 1; }

    /* subtle left-side text legibility overlay */
    .detail-hero-gradient {
      position: absolute;
      inset: 0;
    }

    /* text content on top */
    .detail-hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 0 24px 0;
    }

    .detail-hero-text { flex: 1; min-width: 0; padding-right: 220px; }

    .detail-hero-publisher {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--tq);
      margin-bottom: 6px;
    }

    .detail-hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 36px;
      line-height: 1.1;
      color: var(--tp);
      margin-bottom: 10px;
    }

    .detail-hero-chips { display: flex; gap: 6px; }

    .chip {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .chip-complete { color: var(--pri); border: 1px solid var(--pri); }
    .chip-missing  { color: var(--amb); border: 1px solid var(--amb); }
    .chip-upcoming { color: var(--upc); border: 1px solid var(--upc); }

    /* the large cover that floats over the hero */
    .detail-hero-cover-wrap {
      position: absolute;
      right: 40px;
      bottom: -32px;
      width: 160px;
      aspect-ratio: 2/3;
      border-radius: 4px;
      overflow: hidden;
    }

    .detail-hero-cover-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── FOLDER / ACTION ROW ─── */

    .detail-folder-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      height: 40px;
      border-bottom: 1px solid var(--bd);
      /* push right content to clear the floating cover */
      padding-right: 24px;
      position: relative;
      z-index: 1;
    }

    .detail-folder-path {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--tm);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--tq);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .detail-folder-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: auto;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      height: 26px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 3px;
    }

    .btn-primary { background: var(--pri); color: #000; }
    .btn-sm { height: 22px; padding: 0 10px; font-size: 9px; }
    .btn-ghost-sm {
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      height: 22px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--bd);
      border-radius: 3px;
      background: transparent;
      color: var(--tq);
    }

    /* ─── TABS ─── */

    .issue-tabs-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--bd);
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    .issue-tabs { display: flex; flex: 1; }

    .issue-tab {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--tq);
      padding: 10px 16px 10px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      margin-right: 8px;
    }

    .issue-tab.active { color: var(--pri); border-bottom-color: var(--pri); }

    /* ─── ISSUE GRID ─── */

    .issue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 124px);
      gap: 24px 30px;
      padding: 20px 24px 24px;
      position: relative;
      z-index: 1;
    }

    .issue-tile { width: 124px; position: relative; cursor: pointer; }

    .issue-tile-img {
      width: 124px;
      aspect-ratio: 205 / 315;
      border-radius: 2px;
      overflow: hidden;
      background: var(--su3);
      position: relative;
    }

    .issue-tile-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .issue-tile:hover .issue-tile-img img { transform: scale(1.08); }

    .issue-tile-num {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--tq);
      text-align: center;
      margin-top: 4px;
    }

    /* ─── VARIANT TOGGLE ─── */

    .variant-row {
      display: flex;
      gap: 8px;
      padding: 8px 24px 0;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--tq);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .variant-btn {
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--bd);
      background: transparent;
      color: var(--tq);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
    }

    .variant-btn.active { border-color: var(--pri); color: var(--pri); }
  </style>
</head>
<body>
  <div id="layout">
    <nav id="sidebar">
      <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-text">kometa</span>
      </div>
      <div class="nav-items">
        <a class="nav-item active">Library</a>
        <a class="nav-item">Pull List</a>
        <a class="nav-item">Match</a>
        <a class="nav-item">Activity</a>
        <a class="nav-item">Settings</a>
      </div>
    </nav>

    <div id="content">
      <div id="topbar">
        <button class="btn-ghost">← Library</button>
      </div>

      <div id="app">

        <!-- full-height background layer — spans hero + issues -->
        <div class="detail-bg-layer">
          <div class="detail-bg-layer-img"></div>
        </div>

        <!-- HERO SECTION -->
        <div class="detail-hero">
          <div class="detail-hero-gradient"></div>

          <!-- floating large cover -->
<div class="detail-hero-content">
            <div class="detail-hero-text">
              <div class="detail-hero-publisher">DC Comics &nbsp;·&nbsp; 2024</div>
              <div class="detail-hero-title">Absolute Batman</div>
              <div class="detail-hero-chips">
                <span class="chip chip-complete">11/11 owned</span>
                <span class="chip chip-upcoming">2 upcoming</span>
              </div>
            </div>
          </div>
        </div>

        <!-- FOLDER / ACTION ROW -->
        <div class="detail-folder-row" style="margin-top: 28px;">
          <button class="btn-icon" title="Browse">
            <svg width="13" height="12" viewBox="0 0 13 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 2.5h4l1 1.5h6v6.5H1V2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="detail-folder-path">/comics/DC Comics/Absolute Batman</span>
          <div style="flex:1"></div>
          <button class="btn-icon">✎</button>
          <div class="detail-folder-actions">
            <button class="btn btn-primary btn-sm">Pull</button>
            <button class="btn-ghost-sm">Sweep Missing</button>
            <button class="btn-ghost-sm">Sync</button>
            <button class="btn-ghost-sm">Remove</button>
          </div>
        </div>

        <!-- TABS -->
        <div class="issue-tabs-row">
          <div class="issue-tabs">
            <div class="issue-tab active">All</div>
            <div class="issue-tab">Owned</div>
            <div class="issue-tab">Missing</div>
            <div class="issue-tab">Upcoming</div>
          </div>
        </div>

        <!-- ISSUE GRID -->
        <div class="issue-grid">
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2024/09/23/2db9a60d7a4a41b180cd9017f3430b27.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#1</div>
          </div>
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2024/10/12/1cc18b4449d54e5289ee52d2f6aa3d0f.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#2</div>
          </div>
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2024/11/30/9da7bdb3cb604018a65fc686f3bea9b1.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#3</div>
          </div>
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2024/11/30/b79b5c448db341daa727c80d525a721f.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#4</div>
          </div>
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2025/01/11/e2213de2e11e4b0790e23e0a8a93a8bd.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#5</div>
          </div>
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2025/02/15/0adc9b21699642b5b2d4e29a1c8c54ee.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#6</div>
          </div>
          <div class="issue-tile">
            <div class="issue-tile-img">
              <img src="https://static.metron.cloud/media/issue/2025/03/08/b6e68e18a4b64fdeb3c3da16c4e56f1b.jpg" loading="lazy">
            </div>
            <div class="issue-tile-num">#7</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
