[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: browser smoke tests against the real app (opt-in: pytest -m e2e)
; e2e is opt-in so the default `pytest -q` stays sub-10s. Run the smokes with:
;   .venv/bin/python -m pytest -m e2e -q
addopts = -m "not e2e"
