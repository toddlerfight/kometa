services:
  kometa:
    build: .
    container_name: kometa
    restart: unless-stopped
    ports:
      - "6969:6969"
    volumes:
      - /volume1/docker/kometa/data:/data
      - /volume1/docker/kometa/downloads:/downloads
      - "/volume1/📦/Comics:/comics"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      KOMETA_DB: /data/kometa.db
      KOMGA_URL: ${KOMGA_URL}
      KOMGA_USER: ${KOMGA_USER}
      KOMGA_PASS: ${KOMGA_PASS}
      KOMGA_LIBRARY_ID: ${KOMGA_LIBRARY_ID}
      METRON_USER: ${METRON_USER}
      METRON_PASS: ${METRON_PASS}
      CV_API_KEY: ${CV_API_KEY:-}
      KOMETA_SYNC_HOURS: ${KOMETA_SYNC_HOURS:-5,12,17}
      KOMETA_DOWNLOADS: /downloads
      COMICS_ROOT: /comics
